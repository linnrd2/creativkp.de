<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Materialliste | creativrd</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap');

      :root { --pink: #f6b8d5; --text: #2d1f24; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: 'Poppins', system-ui, sans-serif;
        background: radial-gradient(circle at top left, #fff9cc 0%, #f7e4a7 40%, #f1d186 100%);
        color: var(--text);
      }

      .page { max-width: 1000px; margin: 0 auto; padding: 36px 28px 60px; }
      .back-link { display: inline-flex; align-items: center; gap: 0.6rem; color: #3b3b3b; text-decoration: none; margin-bottom: 1.8rem; }
      .headline { margin: 0 0 1rem; font-size: clamp(2.8rem, 6vw, 4rem); color: var(--pink); }
      .description { max-width: 720px; margin: 0 0 2rem; color: #4d3f42; line-height: 1.75; }

      .list-panel {
        background: rgba(255,255,255,0.95);
        border-radius: 34px;
        padding: 2.2rem;
        box-shadow: 0 30px 72px rgba(89, 65, 50, 0.12);
      }

      .list-panel h2 { margin: 0 0 1rem; font-size: 1.85rem; color: var(--pink); }
      .list-panel ul { list-style: none; margin: 0; padding: 0; display: grid; gap: 1rem; }
      .list-panel li {
        padding: 1.3rem 1.4rem;
        border-radius: 24px;
        background: #fff7dd;
        color: #54484c;
        box-shadow: inset 0 0 0 1px rgba(255,255,255,0.7);
      }
      .list-panel li strong { display: block; margin-bottom: 0.45rem; font-size: 1rem; color: #4d3f43; }
      .list-panel p { margin: 0; line-height: 1.75; }

      .hint { margin-top: 1.8rem; font-size: 0.95rem; color: #5a4b4f; }

      .add-form {
        background: rgba(255,255,255,0.95);
        border-radius: 28px;
        padding: 2rem;
        box-shadow: 0 26px 70px rgba(89, 65, 50, 0.1);
        margin-bottom: 2rem;
      }
      .add-form h2 { margin: 0 0 1rem; font-size: 1.6rem; color: var(--pink); }
      .add-form label { display: block; margin: 0.8rem 0 0.35rem; font-size: 0.95rem; color: #5c4f53; }
      .add-form input[type="text"] {
        width: 100%;
        border: 1px solid rgba(107,87,86,0.2);
        border-radius: 16px;
        padding: 0.9rem 1rem;
        background: rgba(255,255,255,0.96);
        font-size: 0.98rem;
        color: #3f343a;
        font-family: inherit;
        box-sizing: border-box;
      }
      .add-form button {
        margin-top: 1rem;
        border: none;
        border-radius: 16px;
        padding: 0.95rem 1.6rem;
        background: #f6b8d5;
        color: #3d2331;
        font-weight: 700;
        cursor: pointer;
        font-family: inherit;
        font-size: 0.98rem;
      }
      .delete-btn {
        float: right;
        background: none;
        border: none;
        cursor: pointer;
        font-size: 1rem;
        color: #c97a8a;
        padding: 0;
        line-height: 1;
      }

      @media (max-width: 720px) {
        .page { padding: 24px 16px 48px; }
        .list-panel { padding: 1.8rem 1.4rem; }
        .list-panel li { padding: 1rem 1.1rem; }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <a class="back-link" href="projekte.html">← Zurück zu Projekte</a>
      <h1 class="headline">Materialliste</h1>
      <p class="description">Hier kannst du alles planen, was du für dein nächstes Bastelprojekt brauchst. Halte Materialien, Mengen und Details klar fest.</p>

      <section class="add-form">
        <h2>Material hinzufügen</h2>
        <label for="mat-name">Name</label>
        <input id="mat-name" type="text" placeholder="z.B. Schere, Kleber, Papier…" />
        <label for="mat-details">Details</label>
        <input id="mat-details" type="text" placeholder="Menge, Farbe, Hinweise…" />
        <button type="button" id="mat-save">Hinzufügen</button>
      </section>

      <section class="list-panel">
        <h2>Materialien</h2>
        <ul id="material-list">
          <li style="color:#999">Wird geladen…</li>
        </ul>
      </section>
    </main>

    <script type="module">
      import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js';
      import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js';

      const firebaseConfig = {
        apiKey: "AIzaSyCQTyGwXNeqv58GSNyu7p2Z52VWf6weY3o",
        authDomain: "creativkp-4406e.firebaseapp.com",
        projectId: "creativkp-4406e",
        storageBucket: "creativkp-4406e.firebasestorage.app",
        messagingSenderId: "1083893676278",
        appId: "1:1083893676278:web:da4c821c45aab5cb1614d7"
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      const list = document.getElementById('material-list');
      const nameInput = document.getElementById('mat-name');
      const detailsInput = document.getElementById('mat-details');
      const saveBtn = document.getElementById('mat-save');

      async function ladeMaterialien() {
        try {
          const snapshot = await getDocs(collection(db, 'materialien'));
          const alle = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
          alle.sort((a, b) => {
            const tA = a.erstelltAm?.toDate?.()?.getTime() ?? 0;
            const tB = b.erstelltAm?.toDate?.()?.getTime() ?? 0;
            return tB - tA;
          });
          list.innerHTML = '';
          if (alle.length === 0) {
            list.innerHTML = '<li style="color:#999">Noch keine Materialien eingetragen.</li>';
            return;
          }
          alle.forEach(d => {
            const li = document.createElement('li');
            li.innerHTML = `
              <button class="delete-btn" data-id="${d.id}" title="Löschen">✕</button>
              <strong>${d.name}</strong>
              ${d.details ? `<span>${d.details}</span>` : ''}
            `;
            list.appendChild(li);
          });
        } catch (err) {
          console.error(err);
          list.innerHTML = '<li style="color:#c97a8a">Fehler beim Laden. Seite neu laden.</li>';
        }
      }

      saveBtn.addEventListener('click', async () => {
        const name = nameInput.value.trim();
        if (!name) { nameInput.focus(); return; }
        saveBtn.disabled = true;
        saveBtn.textContent = 'Speichert…';
        try {
          await addDoc(collection(db, 'materialien'), {
            name,
            details: detailsInput.value.trim(),
            erstelltAm: serverTimestamp()
          });
          nameInput.value = '';
          detailsInput.value = '';
          await ladeMaterialien();
        } catch (err) {
          console.error(err);
          alert('Fehler beim Speichern.');
        } finally {
          saveBtn.disabled = false;
          saveBtn.textContent = 'Hinzufügen';
        }
      });

      list.addEventListener('click', async e => {
        const btn = e.target.closest('.delete-btn');
        if (!btn) return;
        await deleteDoc(doc(db, 'materialien', btn.dataset.id));
        await ladeMaterialien();
      });

      ladeMaterialien();
    </script>
  </body>
</html>
